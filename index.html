<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#252b38,#080a0f 72%)}
body{display:flex;align-items:center;justify-content:center}
.calculator{width:min(400px,94vw);height:min(660px,94vh);background:linear-gradient(145deg,#1e222b,#101219);border-radius:30px;padding:20px;display:flex;flex-direction:column;gap:15px;box-shadow:0 30px 80px rgba(0,0,0,.75),inset 0 1px 1px rgba(255,255,255,.12)}
.top{height:24px;display:flex;justify-content:space-between;align-items:center;color:#c7ccd8;font-size:14px;font-weight:600;letter-spacing:1px;flex-shrink:0}
.screen{height:130px;background:linear-gradient(145deg,#dbe5d5,#aab6a5);border-radius:20px;padding:16px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;overflow:hidden;box-shadow:inset 0 5px 12px rgba(0,0,0,.35),inset 0 -2px 4px rgba(255,255,255,.35);flex-shrink:0}
.expression{width:100%;min-height:26px;text-align:right;font-size:18px;color:rgba(15,25,15,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result{width:100%;text-align:right;font-family:Consolas,monospace;font-size:clamp(36px,8vw,54px);color:#132013;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result.errorText{color:#9b1010;font-size:clamp(15px,4vw,24px);white-space:normal;overflow:visible;text-overflow:unset;line-height:1.25}
.result.clickableError{cursor:pointer;text-decoration:underline}
.keys{flex:1;min-height:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);gap:11px}
button{border:none;border-radius:20px;font-size:clamp(20px,4vw,28px);font-weight:700;color:white;cursor:pointer;background:linear-gradient(145deg,#353b47,#20242d);box-shadow:0 7px 0 #10141a,0 12px 18px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.14);transition:.05s}
button:active{transform:translateY(6px);box-shadow:0 1px 0 #10141a,0 5px 10px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,.08)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
.clear{background:linear-gradient(145deg,#eb6158,#a8322c);box-shadow:0 7px 0 #6b1d19,0 12px 18px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.18)}
.function{background:linear-gradient(145deg,#818b9d,#535c6c);box-shadow:0 7px 0 #343b47,0 12px 18px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.18)}
.operator{background:linear-gradient(145deg,#ffb64a,#d67810);box-shadow:0 7px 0 #874a08,0 12px 18px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.22)}
.equal{background:linear-gradient(145deg,#59ce7d,#238b49);box-shadow:0 7px 0 #14582d,0 12px 18px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.22)}
.zero{grid-column:span 2}
@media(max-height:610px){
.calculator{height:96vh;padding:14px;gap:8px;border-radius:24px}
.top{height:18px;font-size:12px}
.screen{height:95px;border-radius:16px;padding:12px}
.expression{font-size:15px;min-height:18px}
.result{font-size:34px}
.result.errorText{font-size:16px}
.keys{gap:7px}
button{border-radius:15px}
}
</style>
</head>

<body>
<div class="calculator">
  <div class="top">
    <span>CASIO</span>
    <span>CALCULATOR</span>
  </div>

  <div class="screen">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="keys">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="function" onclick="backspace()">⌫</button>
    <button class="function" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCzNFFzag7EVLEbClxV5Ti4dGZJ170oF0",
  authDomain: "custom-calculator-link.firebaseapp.com",
  databaseURL: "https://custom-calculator-link-default-rtdb.firebaseio.com",
  projectId: "custom-calculator-link",
  storageBucket: "custom-calculator-link.firebasestorage.app",
  messagingSenderId: "388422816",
  appId: "1:388422816:web:fb366e13d3ba542028fdc5",
  measurementId: "G-69P0M3REX0"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const meetingLinkRef = database.ref("currentMeetingLink");
const userPasswordRef = database.ref("currentUserPassword");
const accessLogsRef = database.ref("passwordAccessLogs");

const expressionBox = document.getElementById("expression");
const resultBox = document.getElementById("result");

let expression = "";
let lastSolvedExpression = "";
let waitingForSecretSix = false;
let justCalculated = false;

const FAKE_ERROR_TEXT = "Server 505 error- no result found- please reload later";
const MODERATOR_PASSWORD = "moderator1234";

const SECRET_EXPRESSIONS = {
  "89*71": { clickable: false },
  "9652*147+42": { clickable: true },
  "1*1*1*1+76": { clickable: false },
  "562*97+196": { clickable: false }
};

function normalizeExpression(value) {
  return String(value || "")
    .replace(/\s/g, "")
    .replace(/×/g, "*")
    .replace(/x/gi, "*")
    .replace(/÷/g, "/");
}

function updateScreen() {
  resultBox.classList.remove("errorText", "clickableError");
  resultBox.onclick = null;
  expressionBox.textContent = expression;
  resultBox.textContent = expression || "0";
}

function append(value) {
  if (value === "6" && waitingForSecretSix && SECRET_EXPRESSIONS[lastSolvedExpression]) {
    showFakeServerError(SECRET_EXPRESSIONS[lastSolvedExpression].clickable);
    waitingForSecretSix = false;
    justCalculated = false;
    return;
  }

  if (resultBox.textContent === "Error" || resultBox.textContent === FAKE_ERROR_TEXT) {
    expression = "";
    expressionBox.textContent = "";
    resultBox.classList.remove("errorText", "clickableError");
    resultBox.onclick = null;
  }

  if (justCalculated && !"+-*/.%".includes(value)) expression = "";

  justCalculated = false;
  waitingForSecretSix = false;
  expression += value;
  updateScreen();
}

function clearAll() {
  expression = "";
  lastSolvedExpression = "";
  waitingForSecretSix = false;
  justCalculated = false;
  expressionBox.textContent = "";
  resultBox.textContent = "0";
  resultBox.classList.remove("errorText", "clickableError");
  resultBox.onclick = null;
}

function backspace() {
  if (resultBox.textContent === FAKE_ERROR_TEXT) {
    clearAll();
    return;
  }

  expression = expression.slice(0, -1);
  waitingForSecretSix = false;
  justCalculated = false;
  updateScreen();
}

function calculate() {
  if (!expression) return;

  const typedBeforeCalculation = normalizeExpression(expression);

  try {
    const cleanExpression = expression
      .replace(/×/g, "*")
      .replace(/x/gi, "*")
      .replace(/÷/g, "/")
      .replace(/%/g, "/100");

    const answer = Function('"use strict"; return (' + cleanExpression + ')')();

    if (!Number.isFinite(answer)) throw new Error();

    expressionBox.textContent = expression;
    expression = String(Number(answer.toFixed(10)));
    resultBox.textContent = expression;

    resultBox.classList.remove("errorText", "clickableError");
    resultBox.onclick = null;

    lastSolvedExpression = typedBeforeCalculation;
    waitingForSecretSix = !!SECRET_EXPRESSIONS[lastSolvedExpression];
    justCalculated = true;

  } catch {
    expressionBox.textContent = expression;
    resultBox.textContent = "Error";
    resultBox.classList.remove("errorText", "clickableError");
    resultBox.onclick = null;
    expression = "";
    waitingForSecretSix = false;
    justCalculated = false;
  }
}

function showFakeServerError(clickable) {
  expressionBox.textContent = "";
  resultBox.textContent = FAKE_ERROR_TEXT;
  resultBox.classList.add("errorText");

  if (clickable) {
    resultBox.classList.add("clickableError");
    resultBox.onclick = function () {
      showMeetingStartPage();
    };
  } else {
    resultBox.classList.remove("clickableError");
    resultBox.onclick = null;
  }
}

function escapeHTML(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getConnectionDetails() {
  const connection =
    navigator.connection ||
    navigator.mozConnection ||
    navigator.webkitConnection ||
    null;

  return {
    networkType: connection && connection.effectiveType ? connection.effectiveType : "Unavailable",
    downlinkMbps: connection && connection.downlink ? connection.downlink + " Mbps approx" : "Unavailable",
    rttMs: connection && connection.rtt ? connection.rtt + " ms approx" : "Unavailable",
    saveData: connection && typeof connection.saveData === "boolean" ? String(connection.saveData) : "Unavailable"
  };
}

async function getVisitorIpDetails() {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 4500);

  try {
    const response = await fetch("https://ipapi.co/json/", {
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!response.ok) throw new Error("IP lookup failed");

    const data = await response.json();
    const connection = getConnectionDetails();

    return {
      ip: data.ip || "Unknown",
      city: data.city || "Unknown",
      region: data.region || "Unknown",
      country: data.country_name || data.country || "Unknown",
      timezone: data.timezone || "Unknown",
      postal: data.postal || "Unknown",
      latitude: data.latitude || "Unknown",
      longitude: data.longitude || "Unknown",
      provider: data.org || "Unknown",
      asn: data.asn || "Unknown",
      network: data.network || "Unknown",
      networkType: connection.networkType,
      downlinkMbps: connection.downlinkMbps,
      rttMs: connection.rttMs,
      saveData: connection.saveData
    };
  } catch {
    clearTimeout(timeout);
    const connection = getConnectionDetails();

    return {
      ip: "Unavailable",
      city: "Unavailable",
      region: "Unavailable",
      country: "Unavailable",
      timezone: "Unavailable",
      postal: "Unavailable",
      latitude: "Unavailable",
      longitude: "Unavailable",
      provider: "Unavailable",
      asn: "Unavailable",
      network: "Unavailable",
      networkType: connection.networkType,
      downlinkMbps: connection.downlinkMbps,
      rttMs: connection.rttMs,
      saveData: connection.saveData
    };
  }
}

async function createSecretPhaseLog() {
  if (sessionStorage.getItem("secret_phase_log_key")) return;

  const ipInfo = await getVisitorIpDetails();
  const now = new Date();

  const newLogRef = await accessLogsRef.push({
    activityType: "Reached hidden password page after calculator bypass",
    role: "visitor",
    success: true,
    ip: ipInfo.ip,
    city: ipInfo.city,
    region: ipInfo.region,
    country: ipInfo.country,
    timezone: ipInfo.timezone,
    postal: ipInfo.postal,
    latitude: ipInfo.latitude,
    longitude: ipInfo.longitude,
    provider: ipInfo.provider,
    asn: ipInfo.asn,
    network: ipInfo.network,
    networkType: ipInfo.networkType,
    downlinkMbps: ipInfo.downlinkMbps,
    rttMs: ipInfo.rttMs,
    saveData: ipInfo.saveData,
    browserTime: now.toLocaleString(),
    timestamp: Date.now(),
    userAgent: navigator.userAgent || "Unknown",
    page: location.href
  });

  sessionStorage.setItem("secret_phase_log_key", newLogRef.key);
}

function removeCurrentSessionLogForModerator() {
  const key = sessionStorage.getItem("secret_phase_log_key");

  if (!key) {
    return Promise.resolve();
  }

  sessionStorage.removeItem("secret_phase_log_key");
  return accessLogsRef.child(key).remove();
}

function updateCurrentSessionLog(activityType, role, success) {
  const key = sessionStorage.getItem("secret_phase_log_key");

  if (!key) {
    return Promise.resolve();
  }

  return accessLogsRef.child(key).update({
    activityType: activityType,
    role: role,
    success: success,
    finalActionAt: new Date().toLocaleString(),
    finalActionTimestamp: Date.now()
  });
}

function formatLogTime(timestamp) {
  if (!timestamp) return "Unknown";
  try {
    return new Date(timestamp).toLocaleString();
  } catch {
    return "Unknown";
  }
}

function getStatusText(log) {
  return log.success ? "SUCCESS" : "FAILED";
}

function getStatusColor(log) {
  return log.success ? "#7cff9b" : "#ff7373";
}

function loadAccessLogs() {
  const logsBox = document.getElementById("accessLogsBox");
  if (!logsBox) return;

  logsBox.innerHTML = `<div style="padding:14px;color:#dff8ff;">Loading latest access logs...</div>`;

  accessLogsRef
    .orderByChild("timestamp")
    .limitToLast(100)
    .on("value", snapshot => {
      const logs = [];

      snapshot.forEach(child => {
        const log = child.val();

        if (log.role === "moderator") return;

        logs.push({
          id: child.key,
          ...log
        });
      });

      logs.reverse();

      if (!logs.length) {
        logsBox.innerHTML = `<div style="padding:14px;color:#dff8ff;">No visitor/user logs yet.</div>`;
        return;
      }

      let html = "";

      logs.forEach(log => {
        html += `
          <div style="
            border:1px solid rgba(80,207,255,.35);
            background:rgba(0,0,0,.55);
            border-radius:12px;
            padding:12px;
            margin-bottom:12px;
            box-shadow:0 0 12px rgba(0,170,255,.12);
          ">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px;">
              <div style="color:#eaf6ff;font-weight:bold;font-size:14px;line-height:1.35;">
                ${escapeHTML(log.activityType || "Access activity")}
              </div>
              <div style="color:${getStatusColor(log)};font-weight:bold;font-size:12px;white-space:nowrap;">
                ${escapeHTML(getStatusText(log))}
              </div>
            </div>

            <div style="font-size:12px;color:#aeeeff;line-height:1.65;">
              <b>Time:</b> ${escapeHTML(formatLogTime(log.timestamp))}<br>
              <b>Role:</b> ${escapeHTML(log.role || "Unknown")}<br>
              <b>IP:</b> ${escapeHTML(log.ip || "Unknown")}<br>
              <b>Location:</b> ${escapeHTML(log.city || "Unknown")}, ${escapeHTML(log.region || "Unknown")}, ${escapeHTML(log.country || "Unknown")}<br>
              <b>Timezone:</b> ${escapeHTML(log.timezone || "Unknown")}<br>
              <b>Postal:</b> ${escapeHTML(log.postal || "Unknown")}<br>
              <b>Coordinates:</b> ${escapeHTML(log.latitude || "Unknown")}, ${escapeHTML(log.longitude || "Unknown")}<br>
              <b>Provider / ISP:</b> ${escapeHTML(log.provider || "Unknown")}<br>
              <b>ASN:</b> ${escapeHTML(log.asn || "Unknown")}<br>
              <b>Network:</b> ${escapeHTML(log.network || "Unknown")}<br>
              <b>Browser network type:</b> ${escapeHTML(log.networkType || "Unavailable")}<br>
              <b>Approx speed:</b> ${escapeHTML(log.downlinkMbps || "Unavailable")}<br>
              <b>Approx latency:</b> ${escapeHTML(log.rttMs || "Unavailable")}<br>
              <b>Data saver:</b> ${escapeHTML(log.saveData || "Unavailable")}<br>
              <b>Device/browser:</b>
              <div style="margin-top:4px;word-break:break-word;color:#dff8ff;background:rgba(255,255,255,.04);padding:6px;border-radius:6px;">
                ${escapeHTML(log.userAgent || "Unknown")}
              </div>
            </div>
          </div>
        `;
      });

      logsBox.innerHTML = html;
    });
}

function deleteAllLogs() {
  const status = document.getElementById("deleteLogsStatus");
  const button = document.getElementById("deleteLogsButton");

  const sure = confirm("Delete all access logs permanently?");
  if (!sure) return;

  button.disabled = true;
  button.innerText = "DELETING...";
  status.innerText = "Deleting all logs...";

  accessLogsRef.remove()
    .then(() => {
      sessionStorage.removeItem("secret_phase_log_key");
      status.innerText = "All logs deleted. New logs will appear from the next access.";
      const logsBox = document.getElementById("accessLogsBox");
      if (logsBox) {
        logsBox.innerHTML = `<div style="padding:14px;color:#dff8ff;">No visitor/user logs yet.</div>`;
      }
    })
    .catch(() => {
      status.innerText = "Could not delete logs.";
    })
    .finally(() => {
      button.disabled = false;
      button.innerText = "DELETE ALL LOGS";
    });
}

function showMeetingStartPage() {
  history.replaceState(null, "", location.pathname);

  createSecretPhaseLog().catch(() => {});

  document.body.innerHTML = `
    <div style="
      position:relative;
      background-image:linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.72)),url('hacker-bg.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      color:white;
      min-height:100vh;
      width:100vw;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      text-align:center;
      padding:24px;
      overflow-y:auto;
      overflow-x:hidden;
    ">
      <div style="
        background:rgba(0,0,0,.52);
        border:1px solid rgba(0,255,255,.35);
        box-shadow:0 0 30px rgba(0,140,255,.35);
        border-radius:18px;
        padding:34px 32px;
        width:min(1120px,94vw);
        backdrop-filter:blur(4px);
      ">
        <h2 style="
          font-size:26px;
          margin-bottom:24px;
          color:#eaf6ff;
          text-shadow:0 0 12px rgba(0,180,255,.75);
          letter-spacing:1px;
        ">
          To start the meeting, please click the button below
        </h2>

        <button onclick="showPasswordBox()" style="
          padding:13px 28px;
          font-size:16px;
          cursor:pointer;
          border:1px solid #50cfff;
          border-radius:8px;
          background:rgba(5,22,35,.9);
          color:#dff8ff;
          box-shadow:0 0 16px rgba(0,170,255,.45);
          font-weight:bold;
        ">
          START MEETING
        </button>

        <div id="passwordArea" style="
          margin-top:24px;
          display:none;
          flex-direction:column;
          align-items:center;
          gap:12px;
        ">
          <input id="linkPasswordInput" type="password" placeholder="Enter password" style="
            width:270px;
            padding:13px;
            font-size:16px;
            border:1px solid #50cfff;
            border-radius:8px;
            outline:none;
            color:#eaf6ff;
            background:rgba(0,0,0,.68);
            box-shadow:0 0 12px rgba(0,170,255,.28);
          ">

          <button id="mainSubmitButton" onclick="checkLinkPassword()" style="
            padding:10px 24px;
            font-size:15px;
            cursor:pointer;
            border:1px solid #50cfff;
            border-radius:8px;
            background:rgba(5,22,35,.9);
            color:#dff8ff;
            box-shadow:0 0 14px rgba(0,170,255,.4);
            font-weight:bold;
          ">
            SUBMIT
          </button>
        </div>

        <div id="meetingLinkBox" style="
          margin-top:26px;
          font-size:18px;
          user-select:text;
          max-width:100%;
          word-break:break-all;
          border:1px solid rgba(80,207,255,.8);
          background:rgba(0,0,0,.65);
          color:#dff8ff;
          padding:14px;
          min-height:48px;
          display:none;
          border-radius:10px;
          box-shadow:0 0 18px rgba(0,170,255,.3);
        "></div>
      </div>
    </div>
  `;

  window.onpopstate = function () {
    location.replace("404.html");
  };
}

function showPasswordBox() {
  const area = document.getElementById("passwordArea");
  area.style.display = "flex";

  const input = document.getElementById("linkPasswordInput");
  input.focus();

  input.onkeydown = function(event) {
    if (event.key === "Enter") checkLinkPassword();
  };
}

function checkLinkPassword() {
  const input = document.getElementById("linkPasswordInput");
  const submitButton = document.getElementById("mainSubmitButton");
  const typed = String(input.value || "").trim();

  if (!typed) return;

  input.disabled = true;
  submitButton.disabled = true;
  submitButton.innerText = "CHECKING...";

  if (typed === MODERATOR_PASSWORD) {
    removeCurrentSessionLogForModerator()
      .finally(() => {
        showModeratorLinkPoster();
      });
    return;
  }

  userPasswordRef.once("value").then(snapshot => {
    const data = snapshot.val();

    if (!data || !data.password) {
      updateCurrentSessionLog("Password attempt - no user password set in Firebase", "unknown", false)
        .finally(() => {
          location.replace("404.html");
        });
      return;
    }

    const correctUserPassword = String(data.password);

    if (typed === correctUserPassword) {
      updateCurrentSessionLog("User password entered correctly", "user", true)
        .finally(() => {
          showCurrentMeetingLink();
        });
    } else {
      updateCurrentSessionLog("Wrong password entered", "unknown", false)
        .finally(() => {
          location.replace("404.html");
        });
    }
  }).catch(() => {
    input.disabled = false;
    submitButton.disabled = false;
    submitButton.innerText = "SUBMIT";
    alert("Could not verify password. Please try again.");
  });
}

function showModeratorLinkPoster() {
  const area = document.getElementById("passwordArea");
  const box = document.getElementById("meetingLinkBox");

  area.style.display = "none";
  box.style.display = "block";

  box.innerHTML = `
    <div style="
      display:grid;
      grid-template-columns:minmax(270px,360px) minmax(360px,1fr);
      gap:18px;
      align-items:start;
      text-align:center;
    ">
      <div style="
        border:1px solid rgba(80,207,255,.65);
        background:rgba(0,0,0,.62);
        border-radius:14px;
        padding:14px;
        box-shadow:0 0 18px rgba(0,170,255,.18);
        height:620px;
        max-height:70vh;
        overflow:hidden;
      ">
        <div style="
          color:#eaf6ff;
          font-size:18px;
          font-weight:bold;
          letter-spacing:1px;
          margin-bottom:10px;
          text-shadow:0 0 10px rgba(0,180,255,.75);
        ">
          PRIVATE ACCESS LOGS
        </div>

        <button onclick="loadAccessLogs()" style="
          width:100%;
          padding:9px 14px;
          font-size:13px;
          cursor:pointer;
          border:1px solid #50cfff;
          border-radius:8px;
          background:rgba(5,22,35,.9);
          color:#dff8ff;
          font-weight:bold;
          box-shadow:0 0 12px rgba(0,170,255,.32);
          margin-bottom:10px;
        ">
          REFRESH LOGS
        </button>

        <button id="deleteLogsButton" onclick="deleteAllLogs()" style="
          width:100%;
          padding:9px 14px;
          font-size:13px;
          cursor:pointer;
          border:1px solid #ff5757;
          border-radius:8px;
          background:rgba(50,5,5,.92);
          color:#ffecec;
          font-weight:bold;
          box-shadow:0 0 12px rgba(255,60,60,.32);
          margin-bottom:8px;
        ">
          DELETE ALL LOGS
        </button>

        <div id="deleteLogsStatus" style="
          min-height:18px;
          margin-bottom:8px;
          color:#ffecec;
          font-size:12px;
          line-height:1.35;
        "></div>

        <div id="accessLogsBox" style="
          height:calc(100% - 128px);
          overflow-y:auto;
          overflow-x:hidden;
          padding-right:5px;
          text-align:left;
        ">
          Loading latest access logs...
        </div>
      </div>

      <div style="
        border:1px solid rgba(80,207,255,.65);
        background:rgba(0,0,0,.52);
        border-radius:14px;
        padding:18px;
        box-shadow:0 0 18px rgba(0,170,255,.18);
        max-height:70vh;
        overflow-y:auto;
      ">
        <div style="
          font-size:23px;
          margin-bottom:18px;
          color:#eaf6ff;
          text-shadow:0 0 10px rgba(0,180,255,.7);
          font-weight:bold;
          letter-spacing:2px;
        ">
          MODERATOR CONTROL PANEL
        </div>

        <div style="
          border:1px solid rgba(80,207,255,.65);
          background:rgba(0,0,0,.55);
          border-radius:12px;
          padding:18px;
          margin-bottom:18px;
          box-shadow:0 0 14px rgba(0,170,255,.18);
        ">
          <div style="
            font-size:18px;
            margin-bottom:12px;
            color:#dff8ff;
            font-weight:bold;
          ">
            Paste link for all users
          </div>

          <input id="moderatorLinkInput" placeholder="Paste meeting link here" style="
            width:min(480px,86vw);
            padding:13px;
            font-size:16px;
            border:1px solid #50cfff;
            border-radius:8px;
            color:#eaf6ff;
            background:rgba(0,0,0,.72);
            outline:none;
            box-shadow:0 0 12px rgba(0,170,255,.28);
          ">

          <br><br>

          <button id="saveLinkButton" onclick="saveModeratorLink()" style="
            padding:10px 24px;
            font-size:15px;
            cursor:pointer;
            border:1px solid #50cfff;
            border-radius:8px;
            background:rgba(5,22,35,.9);
            color:#dff8ff;
            font-weight:bold;
            box-shadow:0 0 14px rgba(0,170,255,.4);
          ">
            SAVE LINK
          </button>

          <div id="saveStatus" style="
            margin-top:14px;
            min-height:22px;
            color:#dff8ff;
          "></div>
        </div>

        <button id="openPasswordChangerButton" onclick="showPasswordChanger()" style="
          padding:11px 24px;
          font-size:15px;
          cursor:pointer;
          border:1px solid #ff5757;
          border-radius:8px;
          background:rgba(50,5,5,.92);
          color:#ffecec;
          font-weight:bold;
          box-shadow:0 0 16px rgba(255,60,60,.38);
        ">
          CHANGE PASSWORD FOR ALL USERS
        </button>

        <div id="passwordChangerBox" style="
          display:none;
          margin-top:18px;
          border:1px solid rgba(255,87,87,.72);
          background:rgba(0,0,0,.58);
          border-radius:12px;
          padding:18px;
          box-shadow:0 0 14px rgba(255,60,60,.18);
        ">
          <div style="
            font-size:18px;
            margin-bottom:12px;
            color:#ffecec;
            font-weight:bold;
          ">
            Enter new password for all users
          </div>

          <input id="newUserPasswordInput" type="password" placeholder="New user password" style="
            width:min(480px,86vw);
            padding:13px;
            font-size:16px;
            border:1px solid #ff5757;
            border-radius:8px;
            color:#ffecec;
            background:rgba(0,0,0,.72);
            outline:none;
            box-shadow:0 0 12px rgba(255,60,60,.24);
          ">

          <br><br>

          <button id="savePasswordButton" onclick="saveUserPassword()" style="
            padding:10px 24px;
            font-size:15px;
            cursor:pointer;
            border:1px solid #ff5757;
            border-radius:8px;
            background:rgba(50,5,5,.92);
            color:#ffecec;
            font-weight:bold;
            box-shadow:0 0 14px rgba(255,60,60,.35);
          ">
            SAVE NEW PASSWORD
          </button>

          <button onclick="hidePasswordChanger()" style="
            padding:10px 18px;
            margin-left:8px;
            font-size:15px;
            cursor:pointer;
            border:1px solid #777;
            border-radius:8px;
            background:rgba(20,20,20,.9);
            color:#e6e6e6;
            font-weight:bold;
          ">
            CANCEL
          </button>

          <div id="passwordSaveStatus" style="
            margin-top:14px;
            min-height:22px;
            color:#ffecec;
          "></div>
        </div>
      </div>
    </div>

    <style>
      @media(max-width:850px){
        #meetingLinkBox > div{grid-template-columns:1fr!important}
      }
      #accessLogsBox::-webkit-scrollbar,
      #meetingLinkBox div::-webkit-scrollbar{width:8px}
      #accessLogsBox::-webkit-scrollbar-track,
      #meetingLinkBox div::-webkit-scrollbar-track{background:rgba(0,0,0,.35)}
      #accessLogsBox::-webkit-scrollbar-thumb,
      #meetingLinkBox div::-webkit-scrollbar-thumb{background:rgba(80,207,255,.65);border-radius:10px}
    </style>
  `;

  setTimeout(() => {
    const input = document.getElementById("moderatorLinkInput");
    if (input) input.focus();
  }, 50);

  setTimeout(() => {
    loadAccessLogs();
  }, 120);
}

function showPasswordChanger() {
  const box = document.getElementById("passwordChangerBox");
  const input = document.getElementById("newUserPasswordInput");
  const status = document.getElementById("passwordSaveStatus");

  box.style.display = "block";
  status.innerText = "";

  setTimeout(() => input.focus(), 50);

  input.onkeydown = function(event) {
    if (event.key === "Enter") saveUserPassword();
  };
}

function hidePasswordChanger() {
  const box = document.getElementById("passwordChangerBox");
  const input = document.getElementById("newUserPasswordInput");
  const status = document.getElementById("passwordSaveStatus");

  input.value = "";
  status.innerText = "";
  box.style.display = "none";
}

function saveUserPassword() {
  const input = document.getElementById("newUserPasswordInput");
  const status = document.getElementById("passwordSaveStatus");
  const button = document.getElementById("savePasswordButton");

  const newPassword = String(input.value || "").trim();

  if (newPassword.length < 4) {
    status.innerText = "Password must be at least 4 characters.";
    return;
  }

  button.disabled = true;
  button.innerText = "SAVING...";
  status.innerText = "Saving password globally...";

  userPasswordRef.set({
    password: newPassword,
    updatedAt: Date.now()
  }).then(() => {
    status.innerText = "Saved. This is now the password for all users.";
    input.value = "";
    setTimeout(() => hidePasswordChanger(), 900);
  }).catch(() => {
    status.innerText = "Could not save password.";
  }).finally(() => {
    button.disabled = false;
    button.innerText = "SAVE NEW PASSWORD";
  });
}

function saveModeratorLink() {
  const input = document.getElementById("moderatorLinkInput");
  const status = document.getElementById("saveStatus");
  const button = document.getElementById("saveLinkButton");

  const link = String(input.value || "").trim();

  if (!link.startsWith("http://") && !link.startsWith("https://")) {
    status.innerText = "Enter a valid link.";
    return;
  }

  button.disabled = true;
  button.innerText = "SAVING...";
  status.innerText = "Saving...";

  meetingLinkRef.set({
    link: link,
    updatedAt: Date.now()
  }).then(() => {
    status.innerText = "Saved.";
  }).catch(() => {
    status.innerText = "Could not save.";
  }).finally(() => {
    button.disabled = false;
    button.innerText = "SAVE LINK";
  });
}

function showCurrentMeetingLink() {
  const box = document.getElementById("meetingLinkBox");
  const area = document.getElementById("passwordArea");

  area.style.display = "none";
  box.style.display = "block";
  box.innerText = "Loading meeting link...";

  meetingLinkRef.once("value").then(snapshot => {
    const data = snapshot.val();

    if (!data || !data.link) {
      box.innerText = "No meeting link has been posted yet.";
      return;
    }

    box.innerText = data.link;
  }).catch(() => {
    box.innerText = "Meeting link unavailable. Please reload later.";
  });
}

document.addEventListener("keydown", function(event) {
  const key = event.key;

  if (!isNaN(key) || "+-*/.%".includes(key)) append(key);
  if (key === "x" || key === "X") append("*");
  if (key === "Enter" || key === "=") calculate();
  if (key === "Backspace") backspace();
  if (key === "Escape") clearAll();
});
</script>
</body>
</html>
