<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #252b38, #080a0f 72%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      width: min(400px, 94vw);
      height: min(660px, 94vh);
      background: linear-gradient(145deg, #1e222b, #101219);
      border-radius: 30px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.75),
        inset 0 1px 1px rgba(255, 255, 255, 0.12);
    }

    .top {
      height: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #c7ccd8;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .screen {
      height: 130px;
      background: linear-gradient(145deg, #dbe5d5, #aab6a5);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      box-shadow:
        inset 0 5px 12px rgba(0, 0, 0, 0.35),
        inset 0 -2px 4px rgba(255, 255, 255, 0.35);
      flex-shrink: 0;
    }

    .expression {
      width: 100%;
      min-height: 26px;
      text-align: right;
      font-size: 18px;
      color: rgba(15, 25, 15, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result {
      width: 100%;
      text-align: right;
      font-family: Consolas, monospace;
      font-size: clamp(36px, 8vw, 54px);
      color: #132013;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result.errorText {
      color: #9b1010;
      font-size: clamp(15px, 4vw, 24px);
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      line-height: 1.25;
    }

    .result.clickableError {
      cursor: pointer;
      text-decoration: underline;
    }

    .keys {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 11px;
    }

    button {
      border: none;
      border-radius: 20px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(145deg, #353b47, #20242d);
      box-shadow:
        0 7px 0 #10141a,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.14);
      transition: 0.05s;
    }

    button:active {
      transform: translateY(6px);
      box-shadow:
        0 1px 0 #10141a,
        0 5px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    .clear {
      background: linear-gradient(145deg, #eb6158, #a8322c);
      box-shadow:
        0 7px 0 #6b1d19,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.18);
    }

    .function {
      background: linear-gradient(145deg, #818b9d, #535c6c);
      box-shadow:
        0 7px 0 #343b47,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.18);
    }

    .operator {
      background: linear-gradient(145deg, #ffb64a, #d67810);
      box-shadow:
        0 7px 0 #874a08,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.22);
    }

    .equal {
      background: linear-gradient(145deg, #59ce7d, #238b49);
      box-shadow:
        0 7px 0 #14582d,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.22);
    }

    .zero {
      grid-column: span 2;
    }

    @media (max-height: 610px) {
      .calculator {
        height: 96vh;
        padding: 14px;
        gap: 8px;
        border-radius: 24px;
      }

      .top {
        height: 18px;
        font-size: 12px;
      }

      .screen {
        height: 95px;
        border-radius: 16px;
        padding: 12px;
      }

      .expression {
        font-size: 15px;
        min-height: 18px;
      }

      .result {
        font-size: 34px;
      }

      .result.errorText {
        font-size: 16px;
      }

      .keys {
        gap: 7px;
      }

      button {
        border-radius: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="top">
      <span>CASIO</span>
      <span>CALCULATOR</span>
    </div>

    <div class="screen">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="function" onclick="backspace()">⌫</button>
      <button class="function" onclick="append('%')">%</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="zero" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const expressionBox = document.getElementById("expression");
    const resultBox = document.getElementById("result");

    let expression = "";
    let lastSolvedExpression = "";
    let waitingForSecretSix = false;
    let justCalculated = false;

    const FAKE_ERROR_TEXT = "Server 505 error- no result found- please reload later";
    const LINK_PASSWORD = "link1234";

    const SECRET_EXPRESSIONS = {
      "89*71": {
        clickable: false
      },
      "9652*147+42": {
        clickable: true
      },
      "1*1*1*1+76": {
        clickable: false
      },
      "562*97+196": {
        clickable: false
      }
    };

    function normalizeExpression(value) {
      return String(value || "")
        .replace(/\s/g, "")
        .replace(/×/g, "*")
        .replace(/x/gi, "*")
        .replace(/÷/g, "/");
    }

    function updateScreen() {
      resultBox.classList.remove("errorText", "clickableError");
      resultBox.onclick = null;

      expressionBox.textContent = expression;
      resultBox.textContent = expression || "0";
    }

    function append(value) {
      if (
        value === "6" &&
        waitingForSecretSix &&
        SECRET_EXPRESSIONS[lastSolvedExpression]
      ) {
        showFakeServerError(SECRET_EXPRESSIONS[lastSolvedExpression].clickable);
        waitingForSecretSix = false;
        justCalculated = false;
        return;
      }

      if (
        resultBox.textContent === "Error" ||
        resultBox.textContent === FAKE_ERROR_TEXT
      ) {
        expression = "";
        expressionBox.textContent = "";
        resultBox.classList.remove("errorText", "clickableError");
        resultBox.onclick = null;
      }

      if (justCalculated && !"+-*/.%".includes(value)) {
        expression = "";
      }

      justCalculated = false;
      waitingForSecretSix = false;

      expression += value;
      updateScreen();
    }

    function clearAll() {
      expression = "";
      lastSolvedExpression = "";
      waitingForSecretSix = false;
      justCalculated = false;

      expressionBox.textContent = "";
      resultBox.textContent = "0";
      resultBox.classList.remove("errorText", "clickableError");
      resultBox.onclick = null;
    }

    function backspace() {
      if (resultBox.textContent === FAKE_ERROR_TEXT) {
        clearAll();
        return;
      }

      expression = expression.slice(0, -1);
      waitingForSecretSix = false;
      justCalculated = false;
      updateScreen();
    }

    function calculate() {
      if (!expression) return;

      const typedBeforeCalculation = normalizeExpression(expression);

      try {
        const cleanExpression = expression
          .replace(/×/g, "*")
          .replace(/x/gi, "*")
          .replace(/÷/g, "/")
          .replace(/%/g, "/100");

        const answer = Function('"use strict"; return (' + cleanExpression + ')')();

        if (!Number.isFinite(answer)) {
          throw new Error();
        }

        expressionBox.textContent = expression;
        expression = String(Number(answer.toFixed(10)));
        resultBox.textContent = expression;

        resultBox.classList.remove("errorText", "clickableError");
        resultBox.onclick = null;

        lastSolvedExpression = typedBeforeCalculation;
        waitingForSecretSix = !!SECRET_EXPRESSIONS[lastSolvedExpression];
        justCalculated = true;

      } catch {
        expressionBox.textContent = expression;
        resultBox.textContent = "Error";
        resultBox.classList.remove("errorText", "clickableError");
        resultBox.onclick = null;

        expression = "";
        waitingForSecretSix = false;
        justCalculated = false;
      }
    }

    function showFakeServerError(clickable) {
      expressionBox.textContent = "";
      resultBox.textContent = FAKE_ERROR_TEXT;
      resultBox.classList.add("errorText");

      if (clickable) {
        resultBox.classList.add("clickableError");
        resultBox.onclick = function () {
          showMeetingStartPage();
        };
      } else {
        resultBox.classList.remove("clickableError");
        resultBox.onclick = null;
      }
    }

    function showMeetingStartPage() {
      history.replaceState(null, "", location.pathname);

      document.body.innerHTML = `
        <div style="
          position: relative;
          background-image:
            linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.72)),
            url('hacker-bg.png');
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          color: white;
          min-height: 100vh;
          width: 100vw;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: Arial, sans-serif;
          text-align: center;
          padding: 24px;
          overflow: hidden;
        ">
          <div style="
            background: rgba(0, 0, 0, 0.52);
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.35);
            border-radius: 18px;
            padding: 34px 32px;
            width: min(620px, 92vw);
            backdrop-filter: blur(4px);
          ">
            <h2 style="
              font-size: 26px;
              margin-bottom: 24px;
              color: #eaf6ff;
              text-shadow: 0 0 12px rgba(0,180,255,0.75);
              letter-spacing: 1px;
            ">
              To start the meeting, please click the button below
            </h2>

            <button onclick="showPasswordBox()" style="
              padding: 13px 28px;
              font-size: 16px;
              cursor: pointer;
              border: 1px solid #50cfff;
              border-radius: 8px;
              background: rgba(5, 22, 35, 0.9);
              color: #dff8ff;
              box-shadow: 0 0 16px rgba(0, 170, 255, 0.45);
              font-weight: bold;
            ">
              START MEETING
            </button>

            <div id="passwordArea" style="
              margin-top: 24px;
              display: none;
              flex-direction: column;
              align-items: center;
              gap: 12px;
            ">
              <input id="linkPasswordInput" type="password" placeholder="Enter password" style="
                width: 270px;
                padding: 13px;
                font-size: 16px;
                border: 1px solid #50cfff;
                border-radius: 8px;
                outline: none;
                color: #eaf6ff;
                background: rgba(0, 0, 0, 0.68);
                box-shadow: 0 0 12px rgba(0, 170, 255, 0.28);
              ">

              <button onclick="checkLinkPassword()" style="
                padding: 10px 24px;
                font-size: 15px;
                cursor: pointer;
                border: 1px solid #50cfff;
                border-radius: 8px;
                background: rgba(5, 22, 35, 0.9);
                color: #dff8ff;
                box-shadow: 0 0 14px rgba(0, 170, 255, 0.4);
                font-weight: bold;
              ">
                SUBMIT
              </button>
            </div>

            <div id="meetingLinkBox" style="
              margin-top: 26px;
              font-size: 18px;
              user-select: text;
              max-width: 100%;
              word-break: break-all;
              border: 1px solid rgba(80, 207, 255, 0.8);
              background: rgba(0, 0, 0, 0.65);
              color: #dff8ff;
              padding: 14px;
              min-height: 48px;
              display: none;
              border-radius: 10px;
              box-shadow: 0 0 18px rgba(0, 170, 255, 0.3);
            "></div>
          </div>
        </div>
      `;

      window.onpopstate = function () {
        location.replace("404.html");
      };
    }

    function showPasswordBox() {
      const area = document.getElementById("passwordArea");
      area.style.display = "flex";

      const input = document.getElementById("linkPasswordInput");
      input.focus();

      input.onkeydown = function(event) {
        if (event.key === "Enter") {
          checkLinkPassword();
        }
      };
    }

    function checkLinkPassword() {
      const input = document.getElementById("linkPasswordInput");
      const typed = String(input.value || "").trim();

      if (typed === LINK_PASSWORD) {
        showCurrentMeetingLink();
      } else {
        location.replace("404.html");
      }
    }

    async function showCurrentMeetingLink() {
      const box = document.getElementById("meetingLinkBox");
      const area = document.getElementById("passwordArea");

      area.style.display = "none";
      box.style.display = "block";

      try {
        box.innerText = "Loading meeting link...";

        const response = await fetch("temp_link.txt?nocache=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Could not load temp_link.txt");
        }

        const link = (await response.text()).trim();

        box.innerText = link || "No temporary meeting link found.";

      } catch {
        box.innerText = "Temporary meeting link unavailable. Please reload later.";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/.%".includes(key)) {
        append(key);
      }

      if (key === "x" || key === "X") {
        append("*");
      }

      if (key === "Enter" || key === "=") {
        calculate();
      }

      if (key === "Backspace") {
        backspace();
      }

      if (key === "Escape") {
        clearAll();
      }
    });
  </script>
</body>
</html>
