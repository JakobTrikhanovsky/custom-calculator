<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #171217;
      color: white;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 14px;
      font-size: 14px;
      color: #f2f2f2;
      flex-shrink: 0;
    }

    .main {
      height: calc(100vh - 34px);
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 380px;
      overflow: hidden;
    }

    .calculator {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 10px 14px 8px;
    }

    .top-row {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .menu {
      font-size: 28px;
      line-height: 1;
      cursor: default;
    }

    .mode {
      font-size: 22px;
      font-weight: 600;
    }

    .display {
      height: 130px;
      border: 2px solid #ddd;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      font-size: 56px;
      font-weight: 500;
      margin-bottom: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .mini-options {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 56px;
      font-size: 16px;
      color: #f1f1f1;
      flex-shrink: 0;
      padding-left: 14px;
    }

    .memory-row {
      height: 46px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .memory-row button {
      background: transparent;
      border: none;
      color: #f3f3f3;
      font-size: 15px;
      cursor: pointer;
    }

    .memory-row button.disabled {
      color: rgba(255,255,255,0.35);
    }

    .section-row {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 48px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      padding-left: 8px;
      font-size: 17px;
    }

    .buttons {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 4px;
      padding-top: 5px;
    }

    button {
      border: none;
      border-radius: 5px;
      background: #352c34;
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
    }

    button:hover {
      background: #403640;
    }

    button.operator {
      background: #3b2f36;
    }

    button.special {
      background: #312934;
    }

    button.equal {
      background: #d99af0;
      color: #1c101f;
      font-size: 28px;
    }

    button.equal:hover {
      background: #e0a8f4;
    }

    .history {
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 26px 24px;
      overflow: hidden;
    }

    .history-tabs {
      display: flex;
      gap: 32px;
      font-size: 16px;
      margin-bottom: 26px;
    }

    .history-tabs span:first-child {
      border-bottom: 3px solid #d99af0;
      padding-bottom: 10px;
    }

    .history-empty {
      font-size: 17px;
      color: #f5f5f5;
    }

    @media (max-width: 1050px) {
      .main {
        grid-template-columns: 1fr;
      }

      .history {
        display: none;
      }
    }

    @media (max-height: 760px) {
      .display {
        height: 105px;
        font-size: 48px;
      }

      .top-row {
        height: 36px;
      }

      .mini-options {
        height: 34px;
      }

      .memory-row {
        height: 38px;
      }

      .section-row {
        height: 42px;
      }

      button {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="title-bar">
    <span>🧮</span>
    <span>Calculator</span>
  </div>

  <div class="main">
    <section class="calculator">
      <div class="top-row">
        <div class="menu">☰</div>
        <div class="mode">Scientific</div>
      </div>

      <div class="display" id="display">0</div>

      <div class="mini-options">
        <span>DEG</span>
        <span>F-E</span>
      </div>

      <div class="memory-row">
        <button class="disabled">MC</button>
        <button class="disabled">MR</button>
        <button>M+</button>
        <button>M−</button>
        <button>MS</button>
      </div>

      <div class="section-row">
        <span>△ Trigonometry⌄</span>
        <span>ƒ Function⌄</span>
      </div>

      <div class="buttons">
        <button class="special">2ⁿᵈ</button>
        <button class="special">π</button>
        <button class="special">e</button>
        <button class="special" onclick="clearDisplay()">C</button>
        <button class="special" onclick="backspace()">⌫</button>

        <button class="special" onclick="appendValue('**2')">x²</button>
        <button class="special" onclick="appendValue('1/')">¹⁄ₓ</button>
        <button class="special" onclick="appendValue('Math.abs(')">|x|</button>
        <button class="special" onclick="appendValue('Math.exp(')">exp</button>
        <button class="operator" onclick="appendValue('%')">mod</button>

        <button class="special" onclick="appendValue('Math.sqrt(')">²√x</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button class="special" onclick="factorial()">n!</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="special" onclick="appendValue('**')">xʸ</button>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="special" onclick="appendValue('10**')">10ˣ</button>
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="special" onclick="appendValue('Math.log10(')">log</button>
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="special" onclick="appendValue('Math.log(')">ln</button>
        <button onclick="toggleSign()">+/−</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </section>

    <aside class="history">
      <div class="history-tabs">
        <span>History</span>
        <span>Memory</span>
      </div>

      <div class="history-empty">There’s no history yet.</div>
    </aside>
  </div>

  <script>
    const display = document.getElementById("display");
    let expression = "";

    function updateDisplay() {
      display.textContent = expression || "0";
    }

    function appendValue(value) {
      if (expression === "Error") expression = "";
      expression += value;
      updateDisplay();
    }

    function clearDisplay() {
      expression = "";
      updateDisplay();
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      try {
        let result = Function('"use strict"; return (' + expression + ')')();

        if (!isFinite(result)) {
          expression = "Error";
        } else {
          expression = String(Number(result.toFixed(10)));
        }
      } catch {
        expression = "Error";
      }

      updateDisplay();
    }

    function toggleSign() {
      if (!expression) return;

      if (expression.startsWith("-")) {
        expression = expression.slice(1);
      } else {
        expression = "-" + expression;
      }

      updateDisplay();
    }

    function factorial() {
      try {
        let n = Number(expression);

        if (!Number.isInteger(n) || n < 0) {
          expression = "Error";
          updateDisplay();
          return;
        }

        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;

        expression = String(result);
        updateDisplay();
      } catch {
        expression = "Error";
        updateDisplay();
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/().".includes(key)) {
        appendValue(key);
      } else if (key === "Enter") {
        calculate();
      } else if (key === "Backspace") {
        backspace();
      } else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>
</body>
</html>
