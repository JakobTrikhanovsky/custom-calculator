<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #20242f, #090b10 70%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      width: min(420px, 94vw);
      height: min(720px, 94vh);
      background: linear-gradient(145deg, #1c1f27, #101218);
      border-radius: 34px;
      padding: 22px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.65),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .top {
      height: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #bfc5d2;
      font-size: 14px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .screen {
      height: 145px;
      background: linear-gradient(145deg, #d7e0d3, #aebaa8);
      border-radius: 22px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      box-shadow:
        inset 0 4px 10px rgba(0,0,0,0.35),
        inset 0 -2px 4px rgba(255,255,255,0.3);
      overflow: hidden;
      flex-shrink: 0;
    }

    .expression {
      width: 100%;
      min-height: 26px;
      text-align: right;
      font-size: 20px;
      color: rgba(20, 28, 20, 0.65);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .result {
      width: 100%;
      text-align: right;
      font-family: "Consolas", monospace;
      font-size: clamp(38px, 9vw, 58px);
      color: #162016;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .keys {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 22px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 600;
      color: #f7f7f7;
      cursor: pointer;
      background: linear-gradient(145deg, #323743, #20242d);
      box-shadow:
        0 7px 0 #11141a,
        0 12px 20px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.12);
      transition: transform 0.05s ease, box-shadow 0.05s ease, filter 0.1s;
    }

    button:active {
      transform: translateY(6px);
      box-shadow:
        0 1px 0 #11141a,
        0 4px 10px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.08);
    }

    .clear {
      background: linear-gradient(145deg, #e35b52, #a92e28);
      box-shadow:
        0 7px 0 #6f1d1a,
        0 12px 20px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.18);
    }

    .function {
      background: linear-gradient(145deg, #7b8495, #535b6a);
      box-shadow:
        0 7px 0 #353b45,
        0 12px 20px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.18);
    }

    .operator {
      background: linear-gradient(145deg, #ffb84d, #d27a13);
      box-shadow:
        0 7px 0 #8c4d08,
        0 12px 20px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.22);
    }

    .equal {
      background: linear-gradient(145deg, #55c878, #228b48);
      box-shadow:
        0 7px 0 #13572c,
        0 12px 20px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.22);
    }

    .zero {
      grid-column: span 2;
    }

    @media (max-height: 620px) {
      .calculator {
        height: 96vh;
        gap: 10px;
        padding: 16px;
        border-radius: 24px;
      }

      .screen {
        height: 105px;
        border-radius: 18px;
      }

      .keys {
        gap: 8px;
      }

      button {
        border-radius: 16px;
      }

      .top {
        height: 20px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="top">
      <span>CASIO</span>
      <span>CALCULATOR</span>
    </div>

    <div class="screen">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="function" onclick="backspace()">⌫</button>
      <button class="function" onclick="append('%')">%</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="zero" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const expressionBox = document.getElementById("expression");
    const resultBox = document.getElementById("result");

    let expression = "";

    /*
      SECRET SETTINGS
      Type 12345 and press =
      Change the link below to your final secret link.
    */
    const SECRET_OPERATION = "12345";
    const SECRET_LINK = "https://lichess.org";

    function updateScreen() {
      expressionBox.textContent = expression;
      resultBox.textContent = expression || "0";
    }

    function append(value) {
      if (resultBox.textContent === "Error") {
        expression = "";
      }

      expression += value;
      updateScreen();
    }

    function clearAll() {
      expression = "";
      expressionBox.textContent = "";
      resultBox.textContent = "0";
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateScreen();
    }

    function calculate() {
      if (!expression) return;

      if (expression === SECRET_OPERATION) {
        expressionBox.textContent = "ACCESS GRANTED";
        resultBox.textContent = "OPENING";
        setTimeout(() => {
          window.location.href = SECRET_LINK;
        }, 700);
        return;
      }

      try {
        let cleanExpression = expression.replace(/%/g, "/100");
        let answer = Function('"use strict"; return (' + cleanExpression + ')')();

        if (!Number.isFinite(answer)) {
          throw new Error();
        }

        expressionBox.textContent = expression;
        expression = String(Number(answer.toFixed(10)));
        resultBox.textContent = expression;
      } catch {
        expressionBox.textContent = expression;
        resultBox.textContent = "Error";
        expression = "";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/.%".includes(key)) {
        append(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        backspace();
      }

      if (key === "Escape") {
        clearAll();
      }
    });
  </script>
</body>
</html>
