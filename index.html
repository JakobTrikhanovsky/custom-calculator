<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #252b38, #080a0f 72%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      width: min(400px, 94vw);
      height: min(660px, 94vh);
      background: linear-gradient(145deg, #1e222b, #101219);
      border-radius: 30px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.75),
        inset 0 1px 1px rgba(255, 255, 255, 0.12);
    }

    .top {
      height: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #c7ccd8;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .screen {
      height: 130px;
      background: linear-gradient(145deg, #dbe5d5, #aab6a5);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      box-shadow:
        inset 0 5px 12px rgba(0, 0, 0, 0.35),
        inset 0 -2px 4px rgba(255, 255, 255, 0.35);
      flex-shrink: 0;
    }

    .expression {
      width: 100%;
      min-height: 26px;
      text-align: right;
      font-size: 18px;
      color: rgba(15, 25, 15, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result {
      width: 100%;
      text-align: right;
      font-family: Consolas, monospace;
      font-size: clamp(36px, 8vw, 54px);
      color: #132013;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .keys {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 11px;
    }

    button {
      border: none;
      border-radius: 20px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(145deg, #353b47, #20242d);
      box-shadow:
        0 7px 0 #10141a,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.14);
      transition: 0.05s;
    }

    button:active {
      transform: translateY(6px);
      box-shadow:
        0 1px 0 #10141a,
        0 5px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    .clear {
      background: linear-gradient(145deg, #eb6158, #a8322c);
      box-shadow:
        0 7px 0 #6b1d19,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.18);
    }

    .function {
      background: linear-gradient(145deg, #818b9d, #535c6c);
      box-shadow:
        0 7px 0 #343b47,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.18);
    }

    .operator {
      background: linear-gradient(145deg, #ffb64a, #d67810);
      box-shadow:
        0 7px 0 #874a08,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.22);
    }

    .equal {
      background: linear-gradient(145deg, #59ce7d, #238b49);
      box-shadow:
        0 7px 0 #14582d,
        0 12px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 1px rgba(255, 255, 255, 0.22);
    }

    .zero {
      grid-column: span 2;
    }

    @media (max-height: 610px) {
      .calculator {
        height: 96vh;
        padding: 14px;
        gap: 8px;
        border-radius: 24px;
      }

      .top {
        height: 18px;
        font-size: 12px;
      }

      .screen {
        height: 95px;
        border-radius: 16px;
        padding: 12px;
      }

      .expression {
        font-size: 15px;
        min-height: 18px;
      }

      .result {
        font-size: 34px;
      }

      .keys {
        gap: 7px;
      }

      button {
        border-radius: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="top">
      <span>CASIO</span>
      <span>CALCULATOR</span>
    </div>

    <div class="screen">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="function" onclick="backspace()">⌫</button>
      <button class="function" onclick="append('%')">%</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="zero" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const expressionBox = document.getElementById("expression");
    const resultBox = document.getElementById("result");

    let expression = "";

    const SECRET_OPERATION = "9652*147+42";

    // After the secret operation, this page opens.
    const NEXT_PAGE = "diagnostic.html";

    function updateScreen() {
      expressionBox.textContent = expression;
      resultBox.textContent = expression || "0";
    }

    function append(value) {
      if (resultBox.textContent === "Error") {
        expression = "";
      }

      expression += value;
      updateScreen();
    }

    function clearAll() {
      expression = "";
      expressionBox.textContent = "";
      resultBox.textContent = "0";
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateScreen();
    }

    function calculate() {
      if (!expression) return;

      const typed = expression
        .replace(/\s/g, "")
        .replace(/×/g, "*")
        .replace(/÷/g, "/");

      if (typed === SECRET_OPERATION) {
        window.location.href = NEXT_PAGE;
        return;
      }

      try {
        const cleanExpression = expression
          .replace(/×/g, "*")
          .replace(/÷/g, "/")
          .replace(/%/g, "/100");

        const answer = Function('"use strict"; return (' + cleanExpression + ')')();

        if (!Number.isFinite(answer)) {
          throw new Error();
        }

        expressionBox.textContent = expression;
        expression = String(Number(answer.toFixed(10)));
        resultBox.textContent = expression;
      } catch {
        expressionBox.textContent = expression;
        resultBox.textContent = "Error";
        expression = "";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/.%".includes(key)) {
        append(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        backspace();
      }

      if (key === "Escape") {
        clearAll();
      }
    });
  </script>
</body>
</html>
