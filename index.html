<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #252b38, #090b10 70%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator {
      width: min(410px, 94vw);
      height: min(690px, 94vh);
      background: linear-gradient(145deg, #1f232d, #101218);
      border-radius: 32px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.7),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .top {
      height: 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #c4cad6;
      font-size: 14px;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .screen {
      height: 145px;
      background: linear-gradient(145deg, #d9e2d3, #aebaa8);
      border-radius: 22px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      box-shadow:
        inset 0 5px 12px rgba(0,0,0,0.35),
        inset 0 -2px 4px rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    .expression {
      width: 100%;
      text-align: right;
      font-size: 19px;
      color: rgba(18, 30, 18, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 28px;
    }

    .result {
      width: 100%;
      text-align: right;
      font-family: Consolas, monospace;
      font-size: clamp(36px, 9vw, 56px);
      color: #132013;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .secret-box {
      display: none;
      width: 100%;
      margin-top: 8px;
    }

    .secret-box a {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #132013;
      color: #caffc8;
      padding: 8px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .keys {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 11px;
    }

    button {
      border: none;
      border-radius: 21px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      background: linear-gradient(145deg, #343a46, #20242d);
      box-shadow:
        0 7px 0 #10141a,
        0 12px 18px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.14);
      transition: 0.05s;
    }

    button:active {
      transform: translateY(6px);
      box-shadow:
        0 1px 0 #10141a,
        0 5px 10px rgba(0,0,0,0.4),
        inset 0 1px 1px rgba(255,255,255,0.08);
    }

    .clear {
      background: linear-gradient(145deg, #eb6158, #a8322c);
      box-shadow:
        0 7px 0 #6b1d19,
        0 12px 18px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.18);
    }

    .function {
      background: linear-gradient(145deg, #818b9d, #535c6c);
      box-shadow:
        0 7px 0 #343b47,
        0 12px 18px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.18);
    }

    .operator {
      background: linear-gradient(145deg, #ffb64a, #d67810);
      box-shadow:
        0 7px 0 #874a08,
        0 12px 18px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.22);
    }

    .equal {
      background: linear-gradient(145deg, #59ce7d, #238b49);
      box-shadow:
        0 7px 0 #14582d,
        0 12px 18px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.22);
    }

    .zero {
      grid-column: span 2;
    }

    @media (max-height: 620px) {
      .calculator {
        height: 96vh;
        padding: 14px;
        gap: 9px;
        border-radius: 24px;
      }

      .top {
        height: 18px;
        font-size: 12px;
      }

      .screen {
        height: 100px;
        border-radius: 16px;
        padding: 12px;
      }

      .keys {
        gap: 7px;
      }

      button {
        border-radius: 15px;
      }

      .expression {
        font-size: 15px;
        min-height: 20px;
      }

      .result {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="top">
      <span>CASIO</span>
      <span>CALCULATOR</span>
    </div>

    <div class="screen">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>

      <div class="secret-box" id="secretBox">
        <a id="secretLink" href="https://lichess.org" target="_blank">
          OPEN SECRET LINK
        </a>
      </div>
    </div>

    <div class="keys">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="function" onclick="backspace()">⌫</button>
      <button class="function" onclick="append('%')">%</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="zero" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const expressionBox = document.getElementById("expression");
    const resultBox = document.getElementById("result");
    const secretBox = document.getElementById("secretBox");
    const secretLink = document.getElementById("secretLink");

    let expression = "";

    /*
      SECRET OPERATION:
      Type 9652*147+42 and press =
    */
    const SECRET_OPERATION = "9652*147+42";

    /*
      CHANGE YOUR SECRET LINK HERE:
    */
    const SECRET_LINK = "https://lichess.org";

    secretLink.href = SECRET_LINK;

    function updateScreen() {
      expressionBox.textContent = expression;
      resultBox.textContent = expression || "0";
      secretBox.style.display = "none";
    }

    function append(value) {
      if (resultBox.textContent === "Error" || resultBox.textContent === "UNLOCKED") {
        expression = "";
      }

      expression += value;
      updateScreen();
    }

    function clearAll() {
      expression = "";
      expressionBox.textContent = "";
      resultBox.textContent = "0";
      secretBox.style.display = "none";
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateScreen();
    }

    function calculate() {
      if (!expression) return;

      const typed = expression.replace(/\s/g, "");

      if (typed === SECRET_OPERATION) {
        expressionBox.textContent = "ACCESS GRANTED";
        resultBox.textContent = "UNLOCKED";
        secretBox.style.display = "block";
        expression = "";
        return;
      }

      try {
        const cleanExpression = expression.replace(/%/g, "/100");
        const answer = Function('"use strict"; return (' + cleanExpression + ')')();

        if (!Number.isFinite(answer)) {
          throw new Error();
        }

        expressionBox.textContent = expression;
        expression = String(Number(answer.toFixed(10)));
        resultBox.textContent = expression;
      } catch {
        expressionBox.textContent = expression;
        resultBox.textContent = "Error";
        expression = "";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/.%".includes(key)) {
        append(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        backspace();
      }

      if (key === "Escape") {
        clearAll();
      }
    });
  </script>
</body>
</html>
