<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporary Server Diagnostic</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Consolas, monospace;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: #050505;
        color: #00ff66;
        overflow: hidden;
    }

    .noise {
        position: fixed;
        inset: 0;
        background:
            repeating-linear-gradient(
                0deg,
                rgba(0,255,102,0.03),
                rgba(0,255,102,0.03) 1px,
                transparent 1px,
                transparent 3px
            );
        pointer-events: none;
        z-index: 5;
    }

    .random-box {
        position: absolute;
        border: 1px solid rgba(0,255,102,0.35);
        padding: 10px;
        background: rgba(0, 40, 10, 0.35);
        font-size: 13px;
        white-space: pre-line;
        box-shadow: 0 0 10px rgba(0,255,102,0.2);
    }

    .center-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 360px;
        padding: 30px;
        border: 2px solid #00ff66;
        background: rgba(0, 0, 0, 0.92);
        text-align: center;
        box-shadow: 0 0 35px rgba(0,255,102,0.55);
        z-index: 10;
    }

    .center-panel h2 {
        margin-top: 0;
        font-size: 22px;
        color: #ffffff;
    }

    .center-panel button {
        margin-top: 20px;
        padding: 10px 35px;
        font-size: 16px;
        cursor: pointer;
        background: #00ff66;
        color: black;
        border: none;
        font-weight: bold;
    }

    .warning {
        color: #ff5555;
        font-weight: bold;
    }

    .top-alert {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff5555;
        font-size: 18px;
        text-align: center;
        z-index: 20;
        animation: blink 0.8s infinite alternate;
    }

    @keyframes blink {
        from { opacity: 1; }
        to { opacity: 0.35; }
    }
</style>
</head>

<body>

<div class="noise"></div>

<div class="top-alert">
    SERVER DIAGNOSTIC MODE — FAKE STATIC PAGE
</div>

<div class="center-panel">
    <h2>click me to access the link</h2>
    <p class="warning">Temporary gateway verification required</p>
    <button onclick="buttonClicked()">click</button>
</div>

<script>
    const fakeData = [
        "IP ADDRESS: 185.42.91.203\nSTATUS: FLAGGED\nNODE: A9-77-XP",
        "DEVICE CHARGE: 17%\nBATTERY STATE: UNSTABLE\nPOWER ID: PX-5531",
        "HOME COUNTRY: Eldoria\nREGION: North Glass Zone\nCITY: Velmora",
        "USER TRACE: TEMP-8842\nCONFIDENCE: 93.7%\nSESSION: ACTIVE",
        "BROWSER TOKEN: FK-2291-XY\nPACKET LOSS: 44%\nPING: 908ms",
        "LOCAL SCAN: ENABLED\nCACHE PROFILE: EXPOSED\nAUTH LEVEL: LOW",
        "DEVICE NAME: UNKNOWN-772\nSCREEN HASH: 91FA-22CD\nRISK: MEDIUM",
        "NETWORK: PUBLIC RELAY\nROUTER ID: R-00912\nPORT MAP: CLOSED",
        "ACCOUNT SHADOW: FOUND\nLOGIN AGE: 6 MIN\nATTEMPTS: 12",
        "LOCATION GUESS: FAKE\nLATITUDE: 00.0000\nLONGITUDE: 00.0000",
        "IDENTITY SCORE: 81%\nPROFILE TYPE: RANDOMIZED\nDATABASE: DEMO",
        "ACCESS KEY: WAITING\nSERVER CODE: 505\nOVERFLOW: TRUE",
        "PERSONALITY TAG: UNKNOWN\nVOICE ID: NOT FOUND\nCAMERA: BLOCKED",
        "COUNTRY MATCH: FAKE\nCITY MATCH: FAKE\nREGION MATCH: FAKE",
        "SECURITY CHECK: PENDING\nFINAL LINK: LOCKED\nACTION: CLICK"
    ];

    function randomPosition(max) {
        return Math.floor(Math.random() * max);
    }

    function createBoxes() {
        for (let i = 0; i < fakeData.length; i++) {
            const box = document.createElement("div");
            box.className = "random-box";
            box.textContent = fakeData[i];

            box.style.left = randomPosition(window.innerWidth - 220) + "px";
            box.style.top = randomPosition(window.innerHeight - 120) + "px";
            box.style.width = (180 + Math.floor(Math.random() * 120)) + "px";

            document.body.appendChild(box);
        }
    }

    function buttonClicked() {
        alert("Access link not available. Server 505.");
    }

    createBoxes();

    setInterval(() => {
        document.querySelectorAll(".random-box").forEach(box => {
            box.style.left = randomPosition(window.innerWidth - 220) + "px";
            box.style.top = randomPosition(window.innerHeight - 120) + "px";
        });
    }, 1800);
</script>

</body>
</html>
